<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #1e2022;
            --secondary: #52616b;
            --accent: #c9d6df;

            font-family: 'Tajawal', sans-serif;

<body>

    <div class="card" id="mainCard">
        <div id="introSection">
            <img src="hadeel.jpg" alt="هديل" class="profile-img" onerror="this.style.display='none'">
            
            <h1>إلى هديل</h1>
            <p>تعليقي على الفيديو كان خطأ وما أنطى لجهدج حقه. <span class="highlight">هديل</span>، قيمتج محفوظة والصداقة أهم من تصرف غير محسوب. نفتح صفحة جديدة؟</p>
            
            <div class="btn-container">
                <button class="btn-yes" onclick="showSignature()">صافية لبن</button>
                <button class="btn-no" id="noBtn">لا، مارضيت</button>
            </div>
        </div>

        <div id="signatureArea">
            <h1>توثيق الصلح</h1>
            <p>الرجاء توقيع <span class="highlight">هديل</span> أدناه لاعتماد المعاهدة رسمياً.</p>
            <canvas id="sigCanvas" width="350" height="180"></canvas>
            <button class="btn-submit" onclick="submitTreaty()">اعتماد التوقيع</button>
            <div class="timestamp" id="currentTime"></div>
        </div>

        <div id="finalMessage">
            <div class="stamp">تم الصلح</div>
            <p class="highlight">تم توثيق معاهدة الصلح رسمياً.</p>
            <div class="timestamp" id="finalTime"></div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const evasionTexts = [
            "هديل، متأكدة؟",
            "فكري زين",
            "ترا خوش ولد",
            "مو من كلبج",
            "فضيها ووافقي",
            "راح تتعبين بالرفض",
            "عناد هو؟"
        ];
        let textIndex = 0;

        function moveButton() {
            const btnRect = noBtn.getBoundingClientRect();
            const containerRect = document.body.getBoundingClientRect();
            
            const maxX = containerRect.width - btnRect.width - 20;
            const maxY = containerRect.height - btnRect.height - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            noBtn.innerText = evasionTexts[textIndex];
            textIndex = (textIndex + 1) % evasionTexts.length;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            moveButton();
        });

        function showSignature() {
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('signatureArea').style.display = 'block';
            document.getElementById('currentTime').innerText = "تاريخ الإنشاء: " + new Date().toLocaleString('ar-IQ');
            initCanvas();
        }

        let canvas, ctx;
        let isDrawing = false;

        function initCanvas() {
            canvas = document.getElementById('sigCanvas');
            ctx = canvas.getContext('2d');
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e2022';

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', stopDrawing);
        }

        function getMousePos(canvas, evt) {
            var rect = canvas.getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) * (canvas.width / rect.width),
                y: (evt.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function getTouchPos(canvas, evt) {
            var rect = canvas.getBoundingClientRect();
            return {
                x: (evt.touches[0].clientX - rect.left) * (canvas.width / rect.width),
                y: (evt.touches[0].clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            var pos = getMousePos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            var pos = getMousePos(canvas, e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function handleTouchStart(e) {
            e.preventDefault();
            isDrawing = true;
            var pos = getTouchPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            var pos = getTouchPos(canvas, e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function submitTreaty() {
            document.getElementById('signatureArea').style.display = 'none';
            document.getElementById('finalMessage').style.display = 'block';
            document.getElementById('finalTime').innerText = "وثيقة رقم: " + Math.floor(Math.random() * 1000000) + " | " + new Date().toLocaleString('ar-IQ');
        }
    </script>
</body>
</html>
